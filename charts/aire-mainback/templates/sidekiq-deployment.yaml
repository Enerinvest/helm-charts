{{- if .Values.sidekiq.enabled }}

apiVersion: apps/v1
kind: Deployment

metadata:
  name: {{ include "aire.sidekiq.name" . }}
  namespace: {{ include "aire.namespace" . }}

spec:
  replicas: {{ .Values.sidekiq.replicas }}

  selector:
    matchLabels:
      app: {{ include "aire.sidekiq.name" . }}

  template:
    metadata:
      labels:
        app: {{ include "aire.sidekiq.name" . }}

    spec:
      containers:
      - name: sidekiq

        image: {{ include "aire.image" . }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        command:
        - bundle
        - exec
        - sidekiq

        envFrom:
        {{- if .Values.configMap.enabled }}
        - configMapRef:
            name: {{ .Values.deploy.project }}-{{ .Values.deploy.instance }}-config
        {{- end }}

{{- end }}